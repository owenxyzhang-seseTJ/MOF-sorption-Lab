name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      - name: Build app and installer
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\windows\build_windows.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: MOF-Sorption-Lab-Setup-1.2
          path: dist-installer/MOF-Sorption-Lab-Setup-1.2.exe

      - name: Upload portable app
        uses: actions/upload-artifact@v4
        with:
          name: MOF-Sorption-Lab-Portable
          path: dist/MOF Sorption Lab/**
